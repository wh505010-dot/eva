<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Productos | Panel administrador</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Fredoka:wght@500;600&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="img/favicon/favicon.png">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="admin-body">

    <div class="admin-layout">
        <!-- ===== SIDEBAR ===== -->
        <aside class="admin-sidebar">
            <div class="admin-logo">
                <span class="logo-icono"><i class="bi bi-paw-fill"></i></span>
                <div>
                    <p class="mb-0 fw-bold text-white">Patitas El Rey</p>
                    <small class="text-white-50">Panel administrador</small>
                </div>
            </div>

            <nav class="admin-nav">
                <a href="admin.html" class="admin-nav-link">
                    <i class="bi bi-speedometer2"></i> Dashboard
                </a>
                <a href="admin-pedidos.html" class="admin-nav-link">
                    <i class="bi bi-bag-heart"></i> Pedidos
                </a>
                <a href="admin-productos.html" class="admin-nav-link active">
                    <i class="bi bi-box-seam"></i> Productos
                </a>
                 <a href="admin-mensajes.html" class="admin-nav-link">
                    <i class="bi bi-envelope"></i> Mensajes
                </a>
            </nav>

            <div class="admin-sidebar-footer">
                <a href="index.html" class="admin-nav-link">
                    <i class="bi bi-globe"></i> Ver sitio público
                </a>
                <a href="#" class="admin-nav-link text-warning" onclick="cerrarSesion(); return false;">
                    <i class="bi bi-box-arrow-right"></i> Cerrar sesión
                </a>
            </div>
        </aside>

        <!-- ===== CONTENIDO ===== -->
        <main class="admin-contenido" id="admin-productos-page">
            <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-2">
                <div>
                    <p class="text-muted mb-0">Panel administrador</p>
                    <h3 class="fw-bold mb-0">Gestión de productos</h3>
                </div>
                <button class="btn btn-brand" data-bs-toggle="modal" data-bs-target="#modalProducto" onclick="abrirModalNuevoProducto()">
                    <i class="bi bi-plus-lg"></i> Agregar producto
                </button>
            </div>

            <div class="row g-4" id="contenedor-productos-admin"></div>
        </main>
    </div>

    <!-- ===== MODAL AGREGAR / EDITAR PRODUCTO ===== -->
    <div class="modal fade" id="modalProducto" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="modalProductoTitulo"><i class="bi bi-box-seam text-brand"></i> Nuevo producto</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div id="alerta-producto-error" class="alert alert-danger d-none"></div>
                    <form id="form-producto" novalidate>
                        <input type="hidden" id="prod-id">
                        <div class="mb-3">
                            <label for="prod-nombre" class="form-label">Nombre</label>
                            <input type="text" class="form-control" id="prod-nombre">
                            <div class="invalid-feedback" id="error-prod-nombre"></div>
                        </div>
                        <div class="mb-3">
                            <label for="prod-descripcion" class="form-label">Descripción</label>
                            <textarea class="form-control" id="prod-descripcion" rows="2"></textarea>
                            <div class="invalid-feedback" id="error-prod-descripcion"></div>
                        </div>
                        <div class="row g-2">
                            <div class="col-6">
                                <label for="prod-precio" class="form-label">Precio (MXN)</label>
                                <input type="number" class="form-control" id="prod-precio" min="0" step="0.01">
                                <div class="invalid-feedback" id="error-prod-precio"></div>
                            </div>
                            <div class="col-6">
                                <label for="prod-imagen" class="form-label">Ruta de imagen</label>
                                <input type="text" class="form-control" id="prod-imagen" placeholder="img/producto-x.jpg">
                                <div class="invalid-feedback" id="error-prod-imagen"></div>
                            </div>
                        </div>
                        <div class="form-check mt-3">
                            <input type="checkbox" class="form-check-input" id="prod-destacado">
                            <label class="form-check-label" for="prod-destacado">Marcar como "Más vendido"</label>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-outline-brand" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-brand" id="btn-guardar-producto">Guardar producto</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/supabase-config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/carrito.js"></script>
    <script src="js/script.js"></script>
</body>
</html>
