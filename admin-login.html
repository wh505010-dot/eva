<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso administrador | Patitas El Rey</title>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Fredoka:wght@500;600&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="img/favicon/favicon.png">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <section class="py-5 auth-section admin-login-section">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-lg-4 col-xl-4">
                    <div class="card border-0 shadow-sm p-4 p-md-5">
                        <div class="text-center mb-4">
                            <i class="bi bi-shield-lock-fill display-5 text-brand"></i>
                            <h3 class="fw-bold mt-2">Acceso administrador</h3>
                            <p class="text-muted small">Zona restringida de Patitas El Rey</p>
                        </div>

                        <div id="alerta-admin-login-error" class="alert alert-danger d-none" role="alert"></div>

                        <form id="form-admin-login" novalidate>
                            <div class="mb-3">
                                <label for="admin-login-email" class="form-label">Correo electrónico</label>
                                <input type="email" class="form-control" id="admin-login-email">
                            </div>

                            <div class="mb-3">
                                <label for="admin-login-password" class="form-label">Contraseña</label>
                                <input type="password" class="form-control" id="admin-login-password">
                            </div>

                            <button type="submit" class="btn btn-brand btn-lg w-100">
                                <i class="bi bi-box-arrow-in-right"></i> Entrar
                            </button>
                        </form>

                        <div class="text-center mt-4 pt-3 border-top">
                            <i class="bi bi-lock-fill text-muted"></i>
                            <small class="text-muted d-block mt-1">Acceso exclusivo para personal autorizado</small>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/supabase-config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/carrito.js"></script>
    <script src="js/script.js"></script>

    <script>
        document.getElementById("form-admin-login").addEventListener("submit", async function (e) {
            e.preventDefault();
            const alertaError = document.getElementById("alerta-admin-login-error");
            alertaError.classList.add("d-none");

            const email = document.getElementById("admin-login-email").value.trim();
            const password = document.getElementById("admin-login-password").value;

            const resultado = await iniciarSesion(email, password);

            if (!resultado.exito) {
                alertaError.textContent = "Correo o contraseña incorrectos.";
                alertaError.classList.remove("d-none");
                return;
            }

            const sesion = await obtenerSesion();

            // si quien entró NO es admin, lo rechazamos y cerramos su sesión
            if (!sesion || sesion.rol !== "admin") {
                await cerrarSesionSilenciosa();
                alertaError.textContent = "Esta puerta de acceso es exclusiva para administradores.";
                alertaError.classList.remove("d-none");
                return;
            }

            window.location.href = "admin.html";
        });
    </script>
</body>
</html>
